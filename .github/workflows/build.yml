name: Build The Team Principal

on:
  push:
    branches: [ dev, main ]
  pull_request: 
    branches: [ dev, main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
        config: [ Debug, Release ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Install required dependencies on Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake pkg-config \
            libx11-dev libxext-dev libxrandr-dev libxrender-dev \
            libxinerama-dev libxcursor-dev libxi-dev libgl1-mesa-dev \
            libwayland-dev libwayland-client0 libwayland-cursor0 \
            libasound2-dev libpulse-dev libudev-dev libdbus-1-dev

      - name: Setup Cmake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "3.25.0"

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=${{ matrix.config }}

      - name: Build project
        run: cmake --build build --config ${{ matrix.config }}

      - name: Verify and Upload binary
        run: |
          # Determine expected binary path
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            EXT=".exe"
          else
            EXT=""
          fi

          # Determine binary path based on build type
          if [ "${{ matrix.config }}" == "Debug" ]; then
            BIN_PATH="bin/debug/TheTeamPrincipal${EXT}"
          else
            BIN_PATH="bin/release/TheTeamPrincipal${EXT}"
          fi

          # Verify the binary exists
          if [ ! -f "$BIN_PATH" ]; then
            echo "Build failed: $BIN_PATH not found"
            exit 1
          fi
          echo "Build succeeded: $BIN_PATH"

          # Upload the binary artifact
          echo "Uploading $BIN_PATH..."
          echo "$BIN_PATH > binary_path.txt"
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.config }}-${{ matrix.os }}
          path: binary_path.txt
